version: "3.9"

services:
  # ── FastAPI backend ──────────────────────────────────────────────────────────
  api:
    build: .
    container_name: datamarket_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/datamarket
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app                    # hot reload in dev
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --reload

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: datamarket_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: datamarket
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Stripe CLI (forward webhooks in dev) ─────────────────────────────────────
  stripe:
    image: stripe/stripe-cli:latest
    container_name: datamarket_stripe
    command: >
      listen
      --api-key ${STRIPE_SECRET_KEY}
      --forward-to api:8000/api/v1/webhooks/stripe
    env_file:
      - .env
    depends_on:
      - api

volumes:
  postgres_data:
